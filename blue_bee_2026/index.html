<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI SELF STUDY - Hệ thống quản lý học tập</title>

    <link
      rel="icon"
      href="/logo.png"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Fonts: Roboto (Vietnamese supported) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;0,900;1,300;1,400&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <style>
      :root {
        --edu-bg: #f8fafc;
        --edu-surface: #ffffff;

        /* Main Brand Color: Blue */
        --edu-primary: #1e40af;
        --edu-primary-hover: #1e3a8a;
        --edu-accent: #eff6ff;

        --edu-text-main: #1f2937;
        --edu-text-muted: #6b7280;

        --edu-border: #e5e7eb;
        --font-main: "Roboto", sans-serif;
      }

      html {
        font-size: 14px;
      }

      body {
        font-family: var(--font-main);
        background-color: var(--edu-bg);
        color: var(--edu-text-main);
        margin: 0;
        padding: 0;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* --- MODERN ROUNDED CARD --- */

      .edu-card {
        background-color: var(--edu-surface);
        border: 1px solid var(--edu-border);
        border-radius: 16px;
        transition: all 0.3s ease;
      }

      /* Scrollbars */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: var(--edu-primary);
      }

      /* Loading Screen */
      #app-loader {
        position: fixed;
        inset: 0;
        background: var(--edu-surface);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
      }
      .loader-bar {
        width: 200px;
        height: 4px;
        background: #e5e7eb;
        position: relative;
        margin-top: 20px;
        overflow: hidden;
      }
      .loader-bar::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 50%;
        background: var(--edu-primary);
        animation: loading 1s infinite ease-in-out;
      }
      @keyframes loading {
        0% {
          left: -50%;
        }
        100% {
          left: 100%;
        }
      }

      /* Animations */
      .animate-fade-in {
        animation: fadeIn 0.4s ease-out forwards;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .animate-slide-up {
        animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>

    <script>
      window.markAppAsReady = () => {
        const loader = document.getElementById("app-loader");
        if (loader) {
          loader.style.opacity = "0";
          loader.style.transition = "opacity 0.5s ease";
          setTimeout(() => (loader.style.display = "none"), 500);
        }
      };
    </script>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@^19.2.4",
          "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
          "react/": "https://esm.sh/react@^19.2.4/",
          "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
          "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
          "pdfjs-dist": "https://esm.sh/pdfjs-dist@^5.4.624",
          "pdfjs-dist/": "https://esm.sh/pdfjs-dist@^5.4.624/",
          "vite": "https://esm.sh/vite@^7.3.1",
          "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4",
          "appwrite": "https://esm.sh/appwrite@16.0.2",
          "react-dom": "https://esm.sh/react-dom@^19.2.4",
          "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.95.3"
        }
      }
    </script>
  </head>
  <body>
    <div id="app-loader">
      <i class="fas fa-square-full text-4xl text-blue-600 animate-spin"></i>
      <div class="loader-bar"></div>
      <p
        style="
          margin-top: 10px;
          font-family: &quot;Roboto&quot;, sans-serif;
          font-size: 10px;
          color: #1e40af;
          font-weight: 900;
          letter-spacing: 2px;
          text-transform: uppercase;
        "
      >
        AI Self Study Loading
      </p>
    </div>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
